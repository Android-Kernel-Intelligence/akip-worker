# ============================================================
# AKIP Kernel Build Workflow
# ============================================================
# Triggered manually via workflow_dispatch.
# Accepts a MANIFEST_ID and API_URL, then:
#   1. Installs Python + akip-cli
#   2. Fetches the BuildManifest from the AKIP API
#   3. Clones the kernel source + applies akip-cli patches
#   4. Compiles the kernel with Clang/LLVM
#   5. Packages the image with AnyKernel3
#   6. Uploads to GitHub Releases + reports FINISHED status to API
# ============================================================

name: AKIP — Kernel Build

on:
  workflow_dispatch:
    inputs:
      MANIFEST_ID:
        description: "Build Manifest UUID (build_id from POST /build)"
        required: true
        type: string
      API_URL:
        description: "Base URL of the AKIP API (e.g. https://akip-api.example.workers.dev)"
        required: true
        type: string

# ── Cancel any in-progress run for the same manifest ──────────────────────────
concurrency:
  group: akip-build-${{ github.event.inputs.MANIFEST_ID }}
  cancel-in-progress: false

# ── Minimal required permissions ──────────────────────────────────────────────
permissions:
  contents: write   # needed to create GitHub Releases

env:
  # ── Toolchain ──────────────────────────────────────────────────────────────
  CLANG_VERSION: "17"
  PYTHON_VERSION: "3.11"
  ANYKERNEL3_REPO: "https://github.com/osm0sis/AnyKernel3.git"
  ANYKERNEL3_BRANCH: "master"

  # ── Derived from inputs ────────────────────────────────────────────────────
  MANIFEST_ID: ${{ github.event.inputs.MANIFEST_ID }}
  API_URL:     ${{ github.event.inputs.API_URL }}

jobs:
  # ============================================================
  # JOB: build
  # ============================================================
  build:
    name: Build Kernel (${{ github.event.inputs.MANIFEST_ID }})
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      # ──────────────────────────────────────────────────────────────────────
      # STEP 0 — Checkout this repository (needed to install akip-cli locally)
      # ──────────────────────────────────────────────────────────────────────
      - name: Checkout akip-worker
        uses: actions/checkout@v4
        with:
          path: akip-worker

      # ──────────────────────────────────────────────────────────────────────
      # STEP 1 — Install Python & akip-cli
      # ──────────────────────────────────────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install akip-cli from repository
        run: |
          echo "::group::Install akip-cli"
          # Install the CLI tool from the checked-out akip-worker package.
          # Falls back to a published PyPI package if setup.py / pyproject.toml is present.
          if [ -f akip-worker/pyproject.toml ] || [ -f akip-worker/setup.py ]; then
            pip install --upgrade pip
            pip install ./akip-worker
          else
            echo "No Python package found in akip-worker — installing from PyPI (akip-cli)"
            pip install --upgrade pip akip-cli
          fi

          # Verify installation
          akip-cli --version
          echo "::endgroup::"

      # ──────────────────────────────────────────────────────────────────────
      # STEP 2 — Fetch the Build Manifest from the AKIP API
      # ──────────────────────────────────────────────────────────────────────
      - name: Report build status -> RUNNING
        run: |
          curl -fsSL \
            -X POST "${{ env.API_URL }}/status/update" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.AKIP_API_TOKEN }}" \
            -d '{
              "build_id": "${{ env.MANIFEST_ID }}",
              "status":   "RUNNING"
            }'

      - name: Fetch Build Manifest from AKIP API
        id: fetch
        run: |
          echo "::group::Fetch manifest ${{ env.MANIFEST_ID }}"

          MANIFEST_JSON=$(curl -fsSL \
            "${{ env.API_URL }}/manifest/${{ env.MANIFEST_ID }}" \
            -H "Authorization: Bearer ${{ secrets.AKIP_API_TOKEN }}")

          # Persist raw manifest for akip-cli
          echo "$MANIFEST_JSON" > manifest.json
          cat manifest.json

          # Extract key fields for subsequent steps
          KERNEL_VERSION=$(echo "$MANIFEST_JSON"   | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['kernel_version'])")
          ARCH=$(echo "$MANIFEST_JSON"             | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['arch'])")
          KERNEL_REPO=$(echo "$MANIFEST_JSON"       | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('kernel_repo', ''))")
          KERNEL_BRANCH=$(echo "$MANIFEST_JSON"     | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('kernel_branch', 'main'))")
          DEFCONFIG=$(echo "$MANIFEST_JSON"         | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('defconfig', 'defconfig'))")
          ENCRYPTED_RULES=$(echo "$MANIFEST_JSON"   | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('encrypted_rules', ''))")

          # Expose as step outputs
          echo "kernel_version=$KERNEL_VERSION"   >> "$GITHUB_OUTPUT"
          echo "arch=$ARCH"                       >> "$GITHUB_OUTPUT"
          echo "kernel_repo=$KERNEL_REPO"         >> "$GITHUB_OUTPUT"
          echo "kernel_branch=$KERNEL_BRANCH"     >> "$GITHUB_OUTPUT"
          echo "defconfig=$DEFCONFIG"             >> "$GITHUB_OUTPUT"
          echo "rules=$ENCRYPTED_RULES"           >> "$GITHUB_OUTPUT"

          echo "::endgroup::"

      # ──────────────────────────────────────────────────────────────────────
      # STEP 3 — Clone kernel source & apply akip-cli patches
      # ──────────────────────────────────────────────────────────────────────
      - name: Clone kernel source
        run: |
          echo "::group::Clone ${{ steps.manifest.outputs.kernel_repo }} @ ${{ steps.manifest.outputs.kernel_branch }}"
          git clone \
            --depth=1 \
            --branch "${{ steps.manifest.outputs.kernel_branch }}" \
            "${{ steps.manifest.outputs.kernel_repo }}" \
            kernel-src
          echo "Kernel source cloned"
          echo "::endgroup::"

      - name: Apply AKIP patches via akip-cli
        id: patch
        run: |
          echo "::group::akip-cli patch"
          echo "::add-mask::${{ secrets.AKIP_DECRYPTION_KEY }}"
          akip-cli patch \
            --source kernel-src \
            --manifest manifest.json \
            --encrypted-rules "${{ steps.fetch.outputs.rules }}" \
            --key "${{ secrets.AKIP_DECRYPTION_KEY }}" \
            --verbose
          echo "Patches applied"
          echo "::endgroup::"

      # ──────────────────────────────────────────────────────────────────────
      # STEP 4 — Install Clang/LLVM toolchain & compile the kernel
      # ──────────────────────────────────────────────────────────────────────
      - name: Install Clang ${{ env.CLANG_VERSION }} + LLVM toolchain
        run: |
          echo "::group::Install Clang/LLVM"
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- ${{ env.CLANG_VERSION }} all
          sudo apt-get install -y \
            clang-${{ env.CLANG_VERSION }} \
            lld-${{ env.CLANG_VERSION }}   \
            llvm-${{ env.CLANG_VERSION }}  \
            binutils-aarch64-linux-gnu     \
            binutils-arm-linux-gnueabihf   \
            bc bison flex libssl-dev libelf-dev
          clang-${{ env.CLANG_VERSION }} --version
          echo "::endgroup::"

      - name: Determine cross-compile variables
        id: toolchain
        run: |
          ARCH="${{ steps.manifest.outputs.arch }}"
          case "$ARCH" in
            arm64|aarch64)
              echo "cross_compile=aarch64-linux-gnu-"              >> "$GITHUB_OUTPUT"
              echo "cross_compile_arm32=arm-linux-gnueabihf-"      >> "$GITHUB_OUTPUT"
              ;;
            arm)
              echo "cross_compile=arm-linux-gnueabihf-"            >> "$GITHUB_OUTPUT"
              echo "cross_compile_arm32="                           >> "$GITHUB_OUTPUT"
              ;;
            x86_64)
              echo "cross_compile="                                 >> "$GITHUB_OUTPUT"
              echo "cross_compile_arm32="                           >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unsupported arch: $ARCH"
              exit 1
              ;;
          esac

      - name: Compile kernel with Clang/LLVM
        id: compile
        run: |
          echo "::group::Kernel compilation"
          ARCH="${{ steps.manifest.outputs.arch }}"
          DEFCONFIG="${{ steps.manifest.outputs.defconfig }}"
          CLANG_BIN="clang-${{ env.CLANG_VERSION }}"
          CLANG_TRIPLE="${{ steps.toolchain.outputs.cross_compile }}"

          # Normalise arch name for make
          [[ "$ARCH" == "arm64" ]] && MAKE_ARCH="arm64" || MAKE_ARCH="$ARCH"

          # Common make flags
          MAKE_FLAGS=(
            -C kernel-src
            -j"$(nproc --all)"
            ARCH="$MAKE_ARCH"
            CC="$CLANG_BIN"
            CLANG_TRIPLE="$CLANG_TRIPLE"
            CROSS_COMPILE="$CLANG_TRIPLE"
            CROSS_COMPILE_ARM32="${{ steps.toolchain.outputs.cross_compile_arm32 }}"
            LD=ld.lld-${{ env.CLANG_VERSION }}
            AR=llvm-ar-${{ env.CLANG_VERSION }}
            NM=llvm-nm-${{ env.CLANG_VERSION }}
            OBJCOPY=llvm-objcopy-${{ env.CLANG_VERSION }}
            OBJDUMP=llvm-objdump-${{ env.CLANG_VERSION }}
            STRIP=llvm-strip-${{ env.CLANG_VERSION }}
            O=../out
          )

          mkdir -p out

          # Generate .config from defconfig
          make "${MAKE_FLAGS[@]}" "$DEFCONFIG"

          # Build the kernel image + modules
          make "${MAKE_FLAGS[@]}" Image Image.gz modules dtbs 2>&1 | tee build.log

          echo "Kernel compiled"
          echo "::endgroup::"

      - name: Upload build log (on failure)
        if: failure() && steps.compile.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ env.MANIFEST_ID }}
          path: build.log
          retention-days: 7

      # ──────────────────────────────────────────────────────────────────────
      # STEP 5 — Package with AnyKernel3
      # ──────────────────────────────────────────────────────────────────────
      - name: Clone AnyKernel3
        run: |
          git clone \
            --depth=1 \
            --branch "${{ env.ANYKERNEL3_BRANCH }}" \
            "${{ env.ANYKERNEL3_REPO }}" \
            AnyKernel3

      - name: Package kernel into flashable ZIP
        id: package
        run: |
          echo "::group::Package with AnyKernel3"

          ARCH="${{ steps.manifest.outputs.arch }}"
          KV="${{ steps.manifest.outputs.kernel_version }}"
          BUILD_ID="${{ env.MANIFEST_ID }}"
          ZIP_NAME="AKIP-${KV}-${BUILD_ID:0:8}.zip"

          # Copy kernel image(s) into AnyKernel3 directory
          if [ -f "out/arch/${ARCH}/boot/Image.gz" ]; then
            cp "out/arch/${ARCH}/boot/Image.gz" AnyKernel3/Image.gz
          fi
          if [ -f "out/arch/${ARCH}/boot/Image" ]; then
            cp "out/arch/${ARCH}/boot/Image" AnyKernel3/Image
          fi

          # Optional: copy Device Tree Blobs
          if [ -d "out/arch/${ARCH}/boot/dts" ]; then
            find "out/arch/${ARCH}/boot/dts" -name "*.dtb" \
              -exec cp {} AnyKernel3/ \; 2>/dev/null || true
          fi

          # Build the flashable ZIP
          cd AnyKernel3
          zip -r9 "../${ZIP_NAME}" . -x "*.git*" -x "*.github*"
          cd ..

          # Compute SHA-256 hash of the ZIP
          BINARY_HASH=$(sha256sum "${ZIP_NAME}" | awk '{print $1}')

          echo "zip_name=${ZIP_NAME}"       >> "$GITHUB_OUTPUT"
          echo "binary_hash=${BINARY_HASH}" >> "$GITHUB_OUTPUT"

          echo "ZIP created: ${ZIP_NAME}"
          echo "SHA-256:     ${BINARY_HASH}"
          echo "::endgroup::"

      # ──────────────────────────────────────────────────────────────────────
      # STEP 6 — Upload to GitHub Releases & report FINISHED status to API
      # ──────────────────────────────────────────────────────────────────────
      - name: Create GitHub Release and upload ZIP
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   "build/${{ env.MANIFEST_ID }}"
          name:       "AKIP Build — ${{ steps.manifest.outputs.kernel_version }} (${{ env.MANIFEST_ID }})"
          body: |
            ## AKIP Kernel Build

            | Field           | Value                                          |
            |-----------------|------------------------------------------------|
            | **Manifest ID** | `${{ env.MANIFEST_ID }}`                       |
            | **Kernel**      | `${{ steps.manifest.outputs.kernel_version }}`  |
            | **Arch**        | `${{ steps.manifest.outputs.arch }}`            |
            | **Defconfig**   | `${{ steps.manifest.outputs.defconfig }}`       |
            | **SHA-256**     | `${{ steps.package.outputs.binary_hash }}`      |
            | **Triggered at**| `${{ github.event.created_at }}`               |

            > Built automatically by the [AKIP Platform](https://github.com/${{ github.repository }}).
          files:      ${{ steps.package.outputs.zip_name }}
          draft:      false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report FINISHED status and binary hash to AKIP API
        if: success()
        run: |
          echo "::group::Report FINISHED to API"
          DOWNLOAD_URL=$(echo '${{ steps.release.outputs.assets }}' | python3 -c "import sys,json; a=json.load(sys.stdin); print(a[0]['browser_download_url'] if a else '')")
          curl -fsSL \
            -X POST "${{ env.API_URL }}/status/update" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.AKIP_API_TOKEN }}" \
            -d "{
              \"build_id\":     \"${{ env.MANIFEST_ID }}\",
              \"status\":       \"FINISHED\",
              \"binary_hash\":  \"${{ steps.package.outputs.binary_hash }}\",
              \"download_url\": \"${DOWNLOAD_URL}\"
            }"
          echo "Status reported"
          echo "::endgroup::"

      # ──────────────────────────────────────────────────────────────────────
      # On failure: report FAILED status to API
      # ──────────────────────────────────────────────────────────────────────
      - name: Report FAILED status to AKIP API
        if: failure()
        run: |
          curl -sSL \
            -X POST "${{ env.API_URL }}/status/update" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.AKIP_API_TOKEN }}" \
            -d "{
              \"build_id\": \"${{ env.MANIFEST_ID }}\",
              \"status\":   \"FAILED\"
            }" || true   # Non-fatal — always continue
